<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>End User License Agreement (EULA)</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      body {
        margin: 0;
        padding: 48px 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: #111111;
        color: #f2f2f2;
        line-height: 1.5;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 12px 0;
        font-size: 28px;
        font-weight: 700;
      }
      p {
        margin: 0 0 16px 0;
        color: #cfcfcf;
      }
      a {
        color: #ed5b01;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .card {
        margin-top: 20px;
        padding: 18px 16px;
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 14px;
        background: rgba(255,255,255,0.03);
      }
      .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 12px 14px;
        border-radius: 12px;
        background: #ed5b01;
        color: #111111;
        font-weight: 700;
      }
      .btn:hover { text-decoration: none; opacity: 0.92; }
      .small { font-size: 13px; color: #9c9c9c; }

  <body>
    <main class="wrap">
      <h1>End User License Agreement (EULA)</h1>
      <p>
        This app uses Apple’s Standard End User License Agreement (EULA).

      <div class="card">
        <p>

          <a href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/" target="_blank" rel="noopener noreferrer">

        <a class="btn" href="https://www.apple.com/legal/internet-services/itunes/dev/stdeula/" target="_blank" rel="noopener noreferrer">
